name: terraform

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: ["main"]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  id-token: write
  pull-requests: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          TERRAFORM_WIF_PROVIDER: ${{ vars.TERRAFORM_WIF_PROVIDER }}
          TERRAFORM_SERVICE_ACCOUNT: ${{ vars.TERRAFORM_SERVICE_ACCOUNT }}
          TERRAFORM_STATE_BUCKET: ${{ vars.TERRAFORM_STATE_BUCKET }}
          TERRAFORM_STATE_PREFIX: ${{ vars.TERRAFORM_STATE_PREFIX }}
        run: |
          configured=true
          for required_var in TERRAFORM_WIF_PROVIDER TERRAFORM_SERVICE_ACCOUNT TERRAFORM_STATE_BUCKET TERRAFORM_STATE_PREFIX; do
            if [ -z "${!required_var}" ]; then
              echo "::notice::Skipping terraform workflow until ${required_var} is configured."
              configured=false
            fi
          done
          echo "configured=${configured}" >> "$GITHUB_OUTPUT"

  plan:
    if: github.event_name == 'pull_request' && needs.preflight.outputs.configured == 'true'
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - terraform_env: staging
            github_environment: staging
    environment: ${{ matrix.github_environment }}
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.TERRAFORM_WIF_PROVIDER }}
          service_account: ${{ vars.TERRAFORM_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3

      - name: Render tfvars
        run: ../render-terraform-tfvars.sh "${{ matrix.terraform_env }}" "environments/${{ matrix.terraform_env }}.tfvars"
        env:
          GOOGLE_CLOUD_PROJECT: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          GITHUB_REPO: ${{ github.repository }}

      - run: terraform init -reconfigure -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" -backend-config="prefix=${{ vars.TERRAFORM_STATE_PREFIX }}/${{ matrix.terraform_env }}"
      - run: terraform fmt -check
      - run: terraform validate
      - run: terraform plan -var-file="environments/${{ matrix.terraform_env }}.tfvars"

  apply:
    if: github.event_name != 'pull_request' && needs.preflight.outputs.configured == 'true'
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - terraform_env: staging
            github_environment: staging
    environment: ${{ matrix.github_environment }}
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.TERRAFORM_WIF_PROVIDER }}
          service_account: ${{ vars.TERRAFORM_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3

      - name: Render tfvars
        run: ../render-terraform-tfvars.sh "${{ matrix.terraform_env }}" "environments/${{ matrix.terraform_env }}.tfvars"
        env:
          GOOGLE_CLOUD_PROJECT: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          GITHUB_REPO: ${{ github.repository }}

      - run: terraform init -reconfigure -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" -backend-config="prefix=${{ vars.TERRAFORM_STATE_PREFIX }}/${{ matrix.terraform_env }}"
      - run: terraform apply -auto-approve -var-file="environments/${{ matrix.terraform_env }}.tfvars"

      - name: Sync GitHub variables from Terraform outputs
        env:
          GH_TOKEN: ${{ github.token }}
        run: ../sync-github-variables-from-terraform.sh "${{ matrix.terraform_env }}" "${{ matrix.github_environment }}"
